{% extends "base.html" %}
{% block title %}Login – FishMarket{% endblock %}
{% block content %}
<div class="form-box" style="margin-top:2rem;">
  <h2 style="font-family:'Playfair Display',serif;margin-bottom:1.5rem;text-align:center;color:var(--ocean);">
    Welcome Back 🐟
  </h2>
  <form method="POST">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required autofocus placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required placeholder="Your password">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Log In</button>
  </form>
  <hr class="divider">
  <p class="text-center text-muted" style="font-size:0.9rem;">
    New here? <a href="{{ url_for('register') }}" class="link">Create an account</a>
  </p>
</div>
{% endblock %}
