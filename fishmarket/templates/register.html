<!-- FILE: register.html -->
{% extends "base.html" %}
{% block title %}Register – FishMarket{% endblock %}
{% block content %}
<div class="form-box" style="margin-top:2rem;">
  <h2 style="font-family:'Playfair Display',serif;margin-bottom:1.5rem;text-align:center;color:var(--ocean);">
    Join FishMarket 🐟
  </h2>
  <form method="POST">
    <div class="form-group">
      <label>I want to join as:</label>
      <div style="display:flex;gap:1rem;">
        <label style="display:flex;align-items:center;gap:0.5rem;font-weight:400;cursor:pointer;">
          <input type="radio" name="role" value="customer" checked> 🛒 Customer
        </label>
        <label style="display:flex;align-items:center;gap:0.5rem;font-weight:400;cursor:pointer;">
          <input type="radio" name="role" value="seller"> 🏪 Seller
        </label>
      </div>
    </div>
    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" name="full_name" required placeholder="e.g. Marie Ngo">
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" name="email" required placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="text" name="phone" placeholder="+237 6XX XXX XXX">
    </div>
    <div class="form-group">
      <label>Address</label>
      <input type="text" name="address" placeholder="Your address">
    </div>
    <div class="form-group">
      <label>Password *</label>
      <input type="password" name="password" required minlength="6" placeholder="Min 6 characters">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Create Account</button>
  </form>
  <hr class="divider">
  <p class="text-center text-muted" style="font-size:0.9rem;">
    Already have an account? <a href="{{ url_for('login') }}" class="link">Log in</a>
  </p>
</div>
{% endblock %}
