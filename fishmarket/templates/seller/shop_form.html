{% extends "base.html" %}
{% block title %}{% if shop %}Edit{% else %}Create{% endif %} Shop – FishMarket{% endblock %}
{% block content %}
<div class="form-box" style="max-width:600px;margin-top:2rem;">
  <h2 style="font-family:'Playfair Display',serif;margin-bottom:1.5rem;color:var(--ocean);">
    {% if shop %}Edit Shop{% else %}Create Your Shop{% endif %}
  </h2>
  <form method="POST">
    <div class="form-group">
      <label>Shop Name *</label>
      <input type="text" name="name" required value="{{ shop.name if shop else '' }}" placeholder="e.g. Poissonnerie du Littoral">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" placeholder="Tell customers about your shop…">{{ shop.description if shop else '' }}</textarea>
    </div>
    <div class="form-group">
      <label>Address / Location *</label>
      <input type="text" name="location" required value="{{ shop.location if shop else '' }}" placeholder="e.g. Marché Central, Akwa">
    </div>
    <div class="form-group">
      <label>City</label>
      <input type="text" name="city" value="{{ shop.city if shop else '' }}" placeholder="e.g. Douala">
    </div>
    <div class="form-group">
      <label>Logo (emoji or URL)</label>
      <input type="text" name="logo_url" value="{{ shop.logo_url if shop else '' }}" placeholder="🐟 or https://...">
    </div>
    {% if shop %}
    <div class="form-group form-check">
      <input type="checkbox" name="is_open" id="is_open" {% if shop.is_open %}checked{% endif %}>
      <label for="is_open" style="font-weight:400;cursor:pointer;">Shop is Open (customers can browse & order)</label>
    </div>
    {% endif %}
    <button type="submit" class="btn btn-primary" style="width:100%;">
      {% if shop %}Save Changes{% else %}Create Shop{% endif %}
    </button>
  </form>
  <div class="mt-2 text-center">
    <a href="{{ url_for('seller_dashboard') }}" class="link">← Back to Dashboard</a>
  </div>
</div>
{% endblock %}
