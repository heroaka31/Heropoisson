{% extends "base.html" %}
{% block title %}{% if fish %}Edit{% else %}Add{% endif %} Fish – FishMarket{% endblock %}
{% block content %}
<div class="form-box" style="max-width:580px;margin-top:2rem;">
  <h2 style="font-family:'Playfair Display',serif;margin-bottom:1.5rem;color:var(--ocean);">
    {% if fish %}Edit Fish Listing{% else %}Add New Fish{% endif %}
  </h2>
  <form method="POST">
    <div class="form-group">
      <label>Fish Name *</label>
      <input type="text" name="name" required value="{{ fish.name if fish else '' }}" placeholder="e.g. Tilapia, Capitaine">
    </div>
    <div class="form-group">
      <label>Species (Scientific Name)</label>
      <input type="text" name="species" value="{{ fish.species if fish else '' }}" placeholder="e.g. Oreochromis niloticus">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" placeholder="Freshness, catch method, preparation tips…">{{ fish.description if fish else '' }}</textarea>
    </div>
    <div class="form-group">
      <label>Price per kg (FCFA) *</label>
      <input type="number" name="price_per_kg" required min="0" step="50"
             value="{{ fish.price_per_kg if fish else '' }}" placeholder="e.g. 2500">
    </div>
    <div class="form-group">
      <label>Stock (kg available)</label>
      <input type="number" name="stock_kg" min="0" step="0.5"
             value="{{ fish.stock_kg if fish else '0' }}" placeholder="e.g. 50">
    </div>
    <div class="form-group">
      <label>Photo URL (optional)</label>
      <input type="url" name="image_url" value="{{ fish.image_url if fish else '' }}" placeholder="https://…">
    </div>
    <div class="form-group form-check">
      <input type="checkbox" name="is_orderable" id="is_orderable"
             {% if (fish and fish.is_orderable) or not fish %}checked{% endif %}>
      <label for="is_orderable" style="font-weight:400;cursor:pointer;">Accept online orders for this fish</label>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;">
      {% if fish %}Update Listing{% else %}Add Listing{% endif %}
    </button>
  </form>
  <div class="mt-2 text-center">
    <a href="{{ url_for('seller_dashboard') }}" class="link">← Back to Dashboard</a>
  </div>
</div>
{% endblock %}
